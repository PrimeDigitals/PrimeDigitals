<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Verify Invoice — PrimeDigitals</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --gold:#C9A84C;--gl:#E2C06A;--gd:#9A7835;
  --bg:#09090F;--bg2:#111118;--bg3:#18181F;
  --border:rgba(201,168,76,.14);--borderh:rgba(201,168,76,.38);
  --text:#F0EDE6;--muted:#8A8A9A;
  --serif:'Cormorant Garamond',serif;--sans:'DM Sans',sans-serif;
  --success:#5deb7a;--error:#ff6b6b;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;display:flex;flex-direction:column;}

nav{height:66px;padding:0 5%;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:rgba(9,9,15,.95);backdrop-filter:blur(14px);}
.logo{font-family:var(--serif);font-size:22px;font-weight:700;color:var(--text);text-decoration:none;}
.logo span{color:var(--gold);}
.nav-links{display:flex;gap:20px;}
.nav-links a{color:var(--muted);text-decoration:none;font-size:13.5px;font-weight:500;transition:color .2s;}
.nav-links a:hover{color:var(--text);}

.container{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 5%;}
.card{background:var(--bg2);border:1px solid var(--borderh);border-radius:12px;padding:48px;max-width:520px;width:100%;text-align:center;}

.status-icon{font-size:80px;margin-bottom:20px;animation:slideDown .5s ease-out;}
@keyframes slideDown{from{opacity:0;transform:translateY(-20px);}to{opacity:1;transform:translateY(0);}}

.status-title{font-family:var(--serif);font-size:32px;font-weight:700;margin-bottom:12px;}
.status-subtitle{font-size:14px;color:var(--muted);line-height:1.8;margin-bottom:32px;}

.badge-status{display:inline-block;padding:8px 20px;border-radius:6px;font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:28px;}
.badge-verified{background:rgba(93,235,122,.15);color:var(--success);border:1px solid rgba(93,235,122,.35);}
.badge-pending{background:rgba(255,140,0,.15);color:#ffb347;border:1px solid rgba(255,140,0,.35);}
.badge-invalid{background:rgba(255,107,107,.15);color:var(--error);border:1px solid rgba(255,107,107,.35);}
.badge-notfound{background:rgba(138,138,154,.15);color:var(--muted);border:1px solid rgba(138,138,154,.35);}

.invoice-details{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:24px;text-align:left;margin-bottom:28px;}
.detail-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(201,168,76,.08);}
.detail-row:last-child{border-bottom:none;}
.detail-label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-weight:600;}
.detail-value{font-size:14px;color:var(--text);font-weight:500;word-break:break-all;text-align:right;}

.loading{text-align:center;padding:40px 20px;}
.spinner{display:inline-block;width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.load-text{font-size:14px;color:var(--muted);margin-top:16px;}

.error-details{background:rgba(255,107,107,.08);border:1px solid rgba(255,107,107,.25);border-radius:6px;padding:14px;font-size:12px;color:#ff9999;line-height:1.7;margin-top:16px;font-family:monospace;word-break:break-all;}

.action-buttons{display:flex;gap:10px;margin-top:28px;}
.btn{padding:12px 28px;border:none;border-radius:4px;font-family:var(--sans);font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;text-decoration:none;display:inline-block;}
.btn-gold{background:var(--gold);color:#09090F;}
.btn-gold:hover{background:var(--gl);}
.btn-outline{background:transparent;color:var(--muted);border:1px solid var(--border);}
.btn-outline:hover{border-color:var(--gold);color:var(--gold);}

.security-badge{background:rgba(93,235,122,.05);border:1px solid rgba(93,235,122,.2);border-radius:6px;padding:12px;font-size:12px;color:var(--success);margin-top:20px;display:flex;align-items:center;gap:8px;}
.security-badge::before{content:'✓';font-weight:700;font-size:16px;}

footer{border-top:1px solid var(--border);padding:24px 5%;text-align:center;color:var(--muted);font-size:12px;}

@media(max-width:600px){
  .card{padding:32px 20px;}
  .status-title{font-size:24px;}
  .action-buttons{flex-direction:column;}
  .btn{width:100%;}
  .detail-row{flex-direction:column;align-items:flex-start;}
  .detail-value{text-align:left;margin-top:5px;}
}

@media print{
  nav, footer, .action-buttons{display:none;}
  body{background:white;color:#000;}
  .card{border:none;box-shadow:none;background:white;}
  .badge-verified{background:#e8f5e9;color:#2e7d32;border:1px solid #4caf50;}
  .invoice-details{background:#f9f9f9;border:1px solid #ddd;}
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">Prime<span>Digitals</span></a>
  <div class="nav-links">
    <a href="index.html">Back to Store</a>
  </div>
</nav>

<div class="container">
  <div class="card" id="content">
    <div class="loading">
      <div class="spinner"></div>
      <div class="load-text">جاري التحقق من الفاتورة...</div>
      <div class="load-text">Verifying invoice...</div>
    </div>
  </div>
</div>

<footer>
  <p>© 2025 PrimeDigitals. All rights reserved. | Invoice Verification System</p>
</footer>

<script>
// Get order ID from URL parameter
const params = new URLSearchParams(window.location.search);
const orderId = params.get('id');

function getOrders(){
  try{return JSON.parse(localStorage.getItem('pd_orders'))||[];}catch(e){return[];}
}

function getS(){
  try{return JSON.parse(localStorage.getItem('pd_settings'))||{};}catch(e){return{};}
}

function formatDate(dateString){
  const d = new Date(dateString);
  return d.toLocaleDateString('en-US', {year:'numeric', month:'long', day:'numeric', hour:'2-digit', minute:'2-digit'});
}

function formatPrice(usdPrice, currency = 'USD'){
  const rates = {USD:1, EGP: 50.5, SAR: 3.75};
  const rate = rates[currency] || 1;
  const amt = (parseFloat(usdPrice) * rate).toFixed(2);
  const symbols = {USD:'$', EGP:'ج.م', SAR:'ر.س'};
  if(currency === 'USD') return `$${amt}`;
  return `${amt} ${symbols[currency]}`;
}

function showVerified(order){
  const s = getS();
  const displayAmt = order.priceDisplay || formatPrice(order.price, order.currency);
  const isSocial = order.type === 'social';
  
  document.getElementById('content').innerHTML = `
    <div class="status-icon">✅</div>
    <div class="status-title">Verified & Authentic</div>
    <div class="status-subtitle">This invoice has been verified successfully. All details match our records.</div>
    <span class="badge-status badge-verified">✓ VERIFIED</span>
    
    <div class="invoice-details">
      <div class="detail-row">
        <span class="detail-label">Order ID</span>
        <span class="detail-value" style="font-family:monospace;font-size:11px">${order.id}</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Product</span>
        <span class="detail-value">${order.product}</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Amount Paid</span>
        <span class="detail-value"><strong>${displayAmt}</strong></span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Payment Method</span>
        <span class="detail-value">${order.paymentMethod || 'PayPal'}</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Date</span>
        <span class="detail-value">${formatDate(order.date)}</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Status</span>
        <span class="detail-value" style="color:var(--success);font-weight:700">${order.status || 'Pending'}</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Customer Email</span>
        <span class="detail-value">${order.customerEmail}</span>
      </div>
      ${isSocial ? `
        <div class="detail-row">
          <span class="detail-label">Social Account</span>
          <span class="detail-value">${order.socialUsername}</span>
        </div>
      ` : `
        <div class="detail-row">
          <span class="detail-label">Activation Email</span>
          <span class="detail-value">${order.activationEmail}</span>
        </div>
      `}
    </div>
    
    <div class="security-badge">
      This invoice is secured by QR code verification technology.
    </div>
    
    <div class="action-buttons">
      <a href="index.html" class="btn btn-gold">← Back to Store</a>
      <button class="btn btn-outline" onclick="window.print()">🖨️ Print</button>
    </div>
  `;
}

function showPending(order){
  const displayAmt = order.priceDisplay || formatPrice(order.price, order.currency);
  document.getElementById('content').innerHTML = `
    <div class="status-icon">⏳</div>
    <div class="status-title">Payment Pending</div>
    <div class="status-subtitle">This invoice is valid but the payment status is still pending. Our team will process it shortly.</div>
    <span class="badge-status badge-pending">⏳ PENDING</span>
    
    <div class="invoice-details">
      <div class="detail-row">
        <span class="detail-label">Order ID</span>
        <span class="detail-value" style="font-family:monospace;font-size:11px">${order.id}</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Product</span>
        <span class="detail-value">${order.product}</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Amount</span>
        <span class="detail-value"><strong>${displayAmt}</strong></span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Status</span>
        <span class="detail-value" style="color:#ffb347;font-weight:700">Pending Processing</span>
      </div>
    </div>
    
    <div class="action-buttons">
      <a href="index.html" class="btn btn-gold">← Back to Store</a>
    </div>
  `;
}

function showNotFound(){
  document.getElementById('content').innerHTML = `
    <div class="status-icon">❌</div>
    <div class="status-title">Invoice Not Found</div>
    <div class="status-subtitle">We couldn't find an invoice with this ID in our system. The QR code may be invalid or expired.</div>
    <span class="badge-status badge-notfound">✗ NOT FOUND</span>
    
    <div class="error-details">
      Order ID: ${orderId || 'Not provided'}
    </div>
    
    <div class="action-buttons">
      <a href="index.html" class="btn btn-gold">← Back to Store</a>
    </div>
  `;
}

function showInvalid(){
  document.getElementById('content').innerHTML = `
    <div class="status-icon">⚠️</div>
    <div class="status-title">Invalid QR Code</div>
    <div class="status-subtitle">The QR code does not contain a valid invoice ID. Please check the QR code and try again.</div>
    <span class="badge-status badge-invalid">✗ INVALID</span>
    
    <div class="error-details">
      Please scan a valid PrimeDigitals invoice QR code.
    </div>
    
    <div class="action-buttons">
      <a href="index.html" class="btn btn-gold">← Back to Store</a>
    </div>
  `;
}

// Verify the invoice
setTimeout(() => {
  if(!orderId){
    showInvalid();
    return;
  }
  
  const orders = getOrders();
  const order = orders.find(o => o.id === orderId);
  
  if(!order){
    showNotFound();
    return;
  }
  
  if(order.status === 'Completed'){
    showVerified(order);
  } else {
    showPending(order);
  }
}, 800);
</script>

</body>
</html>
