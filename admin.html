<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Admin Panel — PrimeDigitals</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --gold:#C9A84C;--gl:#E2C06A;--gd:#9A7835;
  --bg:#09090F;--bg2:#111118;--bg3:#18181F;
  --border:rgba(201,168,76,.15);--borderh:rgba(201,168,76,.35);
  --text:#F0EDE6;--muted:#8A8A9A;
  --sans:'DM Sans',sans-serif;--serif:'Cormorant Garamond',serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;}

#loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:radial-gradient(ellipse 60% 60% at 50% 40%,rgba(201,168,76,.05),transparent 70%);}
.login-box{background:var(--bg2);border:1px solid var(--borderh);border-radius:12px;padding:48px 40px;width:100%;max-width:400px;text-align:center;}
.login-logo{font-family:var(--serif);font-size:26px;font-weight:700;margin-bottom:8px;}
.login-logo span{color:var(--gold);}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:36px;}

.finput{width:100%;padding:12px 15px;background:var(--bg3);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:var(--sans);font-size:14px;outline:none;transition:border .2s;margin-bottom:16px;}
.finput:focus{border-color:var(--gold);}
.flabel{font-size:12px;font-weight:600;text-align:left;display:block;margin-bottom:7px;letter-spacing:.5px;color:var(--muted);text-transform:uppercase;}
.fselect, .ftextarea{width:100%;padding:11px 15px;background:var(--bg3);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:var(--sans);font-size:14px;outline:none;transition:border .2s;}
.ftextarea{resize:vertical;min-height:76px;}

.btn-gold{width:100%;padding:13px;background:var(--gold);color:#09090F;border:none;border-radius:4px;font-family:var(--sans);font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:.5px;}
.btn-gold:hover{background:var(--gl);}
.login-err{font-size:13px;color:#ff6b6b;margin-top:12px;display:none;}

#dashboard{display:none;min-height:100vh;}
.layout{display:flex;min-height:100vh;}
.sidebar{width:240px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto;}
.sidebar-logo{padding:22px 20px 18px;border-bottom:1px solid var(--border);font-family:var(--serif);font-size:20px;font-weight:700;}
.sidebar-logo span{color:var(--gold);}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 20px;cursor:pointer;transition:all .2s;color:var(--muted);font-size:14px;font-weight:500;border-left:2px solid transparent;}
.nav-item.active{color:var(--gold);background:rgba(201,168,76,.05);border-left-color:var(--gold);}

.main{flex:1;padding:30px 34px;overflow-y:auto;}
.tab-content{display:none;}
.tab-content.active{display:block;}

.scard{background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:22px;padding:18px;}
.stats-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:14px;margin-bottom:28px;}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:18px;}
.s-val{font-family:var(--serif);font-size:30px;font-weight:700;color:var(--gold);}

table{width:100%;border-collapse:collapse;margin-top:15px;}
th{padding:9px 14px;text-align:left;font-size:10.5px;text-transform:uppercase;color:var(--muted);background:var(--bg3);}
td{padding:13px 14px;font-size:13.5px;border-bottom:1px solid rgba(201,168,76,.05);}

.btn-sm{padding:7px 15px;background:var(--gold);color:#09090F;border:none;border-radius:3px;font-weight:700;cursor:pointer;font-size:12px;}
.toast{position:fixed;bottom:22px;right:22px;background:var(--bg2);border:1px solid var(--borderh);border-radius:6px;padding:11px 18px;font-size:14px;z-index:9999;opacity:0;transition:all .3s;}
.toast.show{opacity:1;}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);z-index:100;display:none;align-items:center;justify-content:center;padding:20px;}
.ov.open{display:flex;}
.mo{background:var(--bg2);padding:30px;border-radius:10px;width:100%;max-width:540px;}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">Prime<span>Digitals</span></div>
    <p class="login-sub">Admin Control Panel</p>
    <label class="flabel">Password</label>
    <input type="password" class="finput" id="loginPassword" placeholder="Enter admin password"/>
    <button class="btn-gold" id="loginBtn">Sign In</button>
    <p class="login-err" id="loginErr">Incorrect password. Try again.</p>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="layout">
    <div class="sidebar">
      <div class="sidebar-logo">Prime<span>Digitals</span></div>
      <div class="nav-item active" data-tab="products"><span>📦</span> Products</div>
      <div class="nav-item" data-tab="settings"><span>⚙️</span> Settings</div>
      <div style="margin-top:auto; padding:20px;">
        <button class="btn-sm" style="width:100%" id="logoutBtn">Sign Out</button>
      </div>
    </div>

    <div class="main">
      <!-- PRODUCTS TAB -->
      <div class="tab-content active" id="tab-products">
        <h1>Cloud Products</h1>
        <div class="stats-row" id="prodStatsRow"></div>
        <div class="scard">
          <button class="btn-gold" style="width:auto; padding:10px 20px" onclick="openAddProd()">+ Add New Product</button>
          <table>
            <thead><tr><th>Product</th><th>Category</th><th>Price</th><th>Actions</th></tr></thead>
            <tbody id="prodsTable"></tbody>
          </table>
        </div>
      </div>

      <!-- SETTINGS TAB -->
      <div class="tab-content" id="tab-settings">
        <h1>Settings</h1>
        <div class="scard">
          <label class="flabel">Admin Password</label>
          <input type="text" class="finput" id="s_adminPassword" placeholder="New Password"/>
          <button class="btn-gold" onclick="saveSettings()">Save Changes</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- PRODUCT MODAL -->
<div class="ov" id="prodModal">
  <div class="mo">
    <h2 id="modalTitle">Add Product</h2>
    <input type="hidden" id="editProdId"/>
    <input type="text" id="p_name" class="finput" placeholder="Product Name"/>
    <input type="text" id="p_category" class="finput" placeholder="Category"/>
    <input type="number" id="p_price" class="finput" placeholder="Price"/>
    <select id="p_type" class="fselect">
      <option value="software">Software</option>
      <option value="social">Social Media</option>
      <option value="ai">AI Tools</option>
    </select>
    <input type="text" id="p_period" class="finput" placeholder="Period (e.g. month)"/>
    <input type="text" id="p_icon" class="finput" placeholder="Icon (Emoji)"/>
    <textarea id="p_desc" class="ftextarea" placeholder="Description"></textarea>
    <div style="margin-top:15px; display:flex; gap:10px">
      <button class="btn-gold" onclick="saveProd()">Save Product</button>
      <button class="btn-sm" onclick="closeProdModal()">Cancel</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCGm3VNJSnCqJ4kgl6qHY7BBCBYFjPhcwU",
  authDomain: "primedigitals-1802f.firebaseapp.com",
  projectId: "primedigitals-1802f",
  storageBucket: "primedigitals-1802f.firebasestorage.app",
  messagingSenderId: "199046655270",
  appId: "1:199046655270:web:07f214e11244f615d625c7",
  measurementId: "G-8H15L7X9QL"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// --- AUTH LOGIC ---
const loginBtn = document.getElementById('loginBtn');
const loginPass = document.getElementById('loginPassword');

function doLogin() {
    const s = JSON.parse(localStorage.getItem('pd_settings')) || {};
    const correctPass = s.adminPassword || 'prime2024';
    if(loginPass.value === correctPass) {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
    } else {
        document.getElementById('loginErr').style.display = 'block';
    }
}

loginBtn.addEventListener('click', doLogin);
loginPass.addEventListener('keydown', (e) => { if(e.key === 'Enter') doLogin(); });

document.getElementById('logoutBtn').addEventListener('click', () => location.reload());

// --- TABS LOGIC ---
document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', () => {
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    item.classList.add('active');
    document.getElementById('tab-' + item.dataset.tab).classList.add('active');
  });
});

// --- PRODUCT FUNCTIONS ---
window.openAddProd = () => {
    document.getElementById('editProdId').value = '';
    document.getElementById('modalTitle').innerText = 'Add Product';
    document.getElementById('prodModal').classList.add('open');
};

window.closeProdModal = () => document.getElementById('prodModal').classList.remove('open');

window.saveProd = async function() {
    const id = document.getElementById('editProdId').value;
    const data = {
        name: document.getElementById('p_name').value,
        price: document.getElementById('p_price').value,
        cat: document.getElementById('p_category').value,
        type: document.getElementById('p_type').value,
        period: document.getElementById('p_period').value,
        icon: document.getElementById('p_icon').value,
        desc: document.getElementById('p_desc').value
    };

    try {
        if(id) await updateDoc(doc(db, "products", id), data);
        else await addDoc(collection(db, "products"), data);
        showToast("Success!");
        closeProdModal();
    } catch (e) { alert(e.message); }
};

window.deleteProd = async (id) => {
    if(confirm("Delete permanently?")) await deleteDoc(doc(db, "products", id));
};

window.editProd = (id, name, price, cat, type, period, icon, desc) => {
    document.getElementById('editProdId').value = id;
    document.getElementById('p_name').value = name;
    document.getElementById('p_price').value = price;
    document.getElementById('p_category').value = cat;
    document.getElementById('p_type').value = type;
    document.getElementById('p_period').value = period;
    document.getElementById('p_icon').value = icon;
    document.getElementById('p_desc').value = desc;
    document.getElementById('modalTitle').innerText = 'Edit Product';
    document.getElementById('prodModal').classList.add('open');
};

// --- DATA LISTENER ---
onSnapshot(collection(db, "products"), (snapshot) => {
    const tbody = document.getElementById('prodsTable');
    tbody.innerHTML = snapshot.docs.map(d => {
        const p = d.data();
        return `<tr>
            <td>${p.icon || ''} ${p.name}</td>
            <td>${p.cat}</td>
            <td>$${p.price}</td>
            <td>
                <button class="btn-sm" onclick="editProd('${d.id}','${p.name}','${p.price}','${p.cat}','${p.type}','${p.period}','${p.icon}','${p.desc}')">Edit</button>
                <button class="btn-sm" style="background:#ff6b6b" onclick="deleteProd('${d.id}')">✕</button>
            </td>
        </tr>`;
    }).join('');
    document.getElementById('prodStatsRow').innerHTML = `<div class="stat-card"><div class="s-val">${snapshot.size}</div><div>Total Products</div></div>`;
});

// --- SETTINGS ---
window.saveSettings = () => {
    const newPass = document.getElementById('s_adminPassword').value;
    if(newPass) {
        localStorage.setItem('pd_settings', JSON.stringify({adminPassword: newPass}));
        showToast("Password updated!");
    }
};

function showToast(msg) {
    const t = document.getElementById('toast');
    t.innerText = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
</body>
</html>
